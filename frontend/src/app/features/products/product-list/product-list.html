<div class="products-container">
  <div class="header">
    <h1>
      <mat-icon>inventory_2</mat-icon>
      Products
    </h1>
    <div class="header-actions">
      <button *ngIf="canModify" mat-stroked-button color="primary" (click)="openImportDialog()">
        <mat-icon>file_upload</mat-icon>
        Import Products
      </button>
      <button *ngIf="canModify" mat-raised-button color="primary" (click)="openAddProduct()">
        <mat-icon>add</mat-icon>
        Add Product
      </button>
    </div>
  </div>

  <mat-card class="filters-card">
    <mat-card-content>
      <div class="filters">
        <mat-form-field appearance="outline" class="search-field">
          <mat-label>Search Products</mat-label>
          <input
            matInput
            appAutoFocus
            [(ngModel)]="searchText"
            (ngModelChange)="onSearchChange()"
            placeholder="Search by name or SKU..."
          >
          <mat-icon matPrefix>search</mat-icon>
          <button matSuffix mat-icon-button (click)="clearSearch()" *ngIf="searchText" aria-label="Clear">
            <mat-icon>close</mat-icon>
          </button>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Category</mat-label>
          <mat-select [(ngModel)]="selectedCategory" (selectionChange)="applyFilters()">
            <mat-option value="">All Categories</mat-option>
            <mat-option *ngFor="let category of categories; trackBy: trackByCategoryId" [value]="category.id">
              {{ category.name }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Status</mat-label>
          <mat-select [(ngModel)]="selectedStatus" (selectionChange)="applyFilters()">
            <mat-option value="">All Status</mat-option>
            <mat-option [value]="true">Active</mat-option>
            <mat-option [value]="false">Inactive</mat-option>
          </mat-select>
        </mat-form-field>

        <div class="filter-actions">
          <button mat-raised-button color="primary" (click)="applyFilters()">
            <mat-icon>filter_list</mat-icon>
            Apply
          </button>
          <button mat-button color="warn" (click)="clearFilters()">
            <mat-icon>clear</mat-icon>
            Clear
          </button>
        </div>
      </div>
    </mat-card-content>
  </mat-card>

  <div class="grid-container">
    <div class="ag-theme-material" style="width: 100%;">
      <ag-grid-angular
        [gridOptions]="gridOptions"
        [columnDefs]="columnDefs"
        [defaultColDef]="defaultColDef"
        [datasource]="rowDataSource"
        (gridReady)="onGridReady($event)"
      ></ag-grid-angular>
    </div>
  </div>
</div>
