<div class="register-container">
  <mat-card class="register-card">
    <mat-card-header>
      <mat-card-title>Create Account</mat-card-title>
      <mat-card-subtitle>Register to manage your inventory</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
        <div *ngIf="error" class="error-message">
          {{ error }}
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="Enter your email">
          <mat-error *ngIf="email?.invalid && email?.touched">
            <span *ngIf="email?.errors?.['required']">Email is required</span>
            <span *ngIf="email?.errors?.['email']">Please enter a valid email</span>
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" placeholder="Enter your password">
          <button mat-icon-button matSuffix (click)="togglePassword()" type="button">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="password?.invalid && password?.touched">
            <span *ngIf="password?.errors?.['required']">Password is required</span>
            <span *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters</span>
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Role</mat-label>
          <mat-select formControlName="role">
            <mat-option value="staff">Staff</mat-option>
            <mat-option value="manager">Manager</mat-option>
          </mat-select>
          <mat-error *ngIf="role?.invalid && role?.touched">
            <span *ngIf="role?.errors?.['required']">Role is required</span>
          </mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="registerForm.invalid || loading" class="full-width">
          <ng-container *ngIf="loading; else registerLabel">
            <mat-spinner diameter="20"></mat-spinner>
            Creating Account...
          </ng-container>
          <ng-template #registerLabel>
            <mat-icon>person_add</mat-icon>
            Register
          </ng-template>
        </button>

        <div class="login-link">
          Already have an account? <a routerLink="/login" class="link">Login here</a>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
